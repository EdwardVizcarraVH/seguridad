<!DOCTYPE html>
<html>
<head>
    <title>Login - Paso 1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 text-center">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}{% for cat, msg in messages %}<div class="alert alert-{{ cat }}">{{ msg }}</div>{% endfor %}{% endif %}
            {% endwith %}
            <div class="card p-4">
                <h4>Iniciar Sesión (Paso 1)</h4>
                <form method="POST">
                    <input type="text" name="username" class="form-control mb-2" placeholder="Usuario" required>
                    <div class="mb-3">
                        <label>Contraseña:</label>
                        <div class="input-group">
                            <input type="password" name="password" id="passwordField" class="form-control" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                👁️
                            </button>
                        </div>
                        <small class="text-muted">Mínimo 8 caracteres, 1 mayúscula, 1 número y 1 símbolo.</small>
                    </div>

                    <script>
                        const togglePassword = document.querySelector('#togglePassword');
                        const password = document.querySelector('#passwordField');

                        togglePassword.addEventListener('click', function (e) {
                            // Cambiar el tipo de input
                            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                            password.setAttribute('type', type);
                            
                            // Cambiar el emoji del botón (opcional)
                            this.textContent = type === 'password' ? '👁️' : '🙈';
                        });
                    </script>
                    <button class="btn btn-success w-100">Siguiente</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
