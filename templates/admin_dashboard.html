<!DOCTYPE html>
<html lang="es">
<head>
    <title>Admin - Gestión de Usuarios</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between">
        <h2>Panel de Administración (Confidencial)</h2>
        <a href="/logout" class="btn btn-outline-danger">Cerrar Sesión</a>
    </div>
    <hr>
    <table class="table table-bordered mt-4">
        <thead class="table-dark">
            <tr>
                <th>ID</th><th>Usuario</th><th>Rol</th><th>Protección MFA</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.id }}</td><td>{{ u.username }}</td>
                <td><span class="badge bg-info">{{ u.role }}</span></td>
                <td>Habilitada (TOTP)</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
