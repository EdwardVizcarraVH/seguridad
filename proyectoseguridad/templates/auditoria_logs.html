<!DOCTYPE html>
<html lang="es">
<head>
    <title>Auditoría - Integridad de Datos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 class="text-danger">Logs de Seguridad (AUDITOR)</h2>
    <p class="text-muted">Demostración de la Integridad: Registros de acceso inalterables.</p>
    <table class="table table-sm">
        <thead>
            <tr>
                <th>Timestamp</th><th>User ID</th><th>Acción</th><th>IP</th>
            </tr>
        </thead>
        <tbody>
            {% for l in logs %}
            <tr class="{{ 'table-warning' if 'DENEGADO' in l.action else '' }}">
                <td>{{ l.timestamp }}</td><td>{{ l.user_id or 'Anon' }}</td>
                <td>{{ l.action }}</td><td>{{ l.ip_address }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/dashboard" class="btn btn-secondary">Volver al Inicio</a>
</body>
</html>
